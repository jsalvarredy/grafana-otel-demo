repositories:
  - name: grafana
    url: https://grafana.github.io/helm-charts
  - name: open-telemetry
    url: https://open-telemetry.github.io/opentelemetry-helm-charts
  - name: bitnami
    url: https://charts.bitnami.com/bitnami
  - name: ingress-nginx
    url: https://kubernetes.github.io/ingress-nginx
  - name: prometheus-community
    url: https://prometheus-community.github.io/helm-charts

releases:
  - name: ingress-nginx
    namespace: ingress-nginx
    chart: ingress-nginx/ingress-nginx
    version: 4.15.1
    wait: true
    values:
      - controller:
          service:
            type: NodePort
          hostPort:
            enabled: true
          admissionWebhooks:
            enabled: false
            patch:
              enabled: false
  # 2. Prometheus (Metrics) - Replaces Mimir
  - name: prometheus
    namespace: monitoring
    chart: prometheus-community/prometheus
    version: 29.13.0
    values:
      - ../values/prometheus.yaml

  # 3. Loki (Logs)
  - name: loki
    namespace: monitoring
    chart: grafana/loki
    version: 7.0.0
    values:
      - ../values/loki.yaml

  # 4. Tempo (Traces)
  - name: tempo
    namespace: monitoring
    chart: grafana/tempo
    version: 1.24.4
    values:
      - ../values/tempo.yaml

  # 5. Grafana (Visualization)
  - name: grafana
    namespace: monitoring
    chart: grafana/grafana
    version: 10.5.15
    disableValidation: true   
    needs:
      - ingress-nginx/ingress-nginx    
      - monitoring/prometheus   
      - monitoring/loki          
    values:
      - ../values/grafana.yaml

  # 6b. Grafana Alloy - node log collector (DaemonSet)  [FASE 1]
  # Replaces the former otel-logs-agent (OTel Collector). Tails every pod's
  # logs and ships them to Loki, reproducing the same labels (service_name,
  # service_namespace, k8s_*). This is what gives the Java shipping-service
  # (no OTLP logs) its logs in Loki. Promtail/Grafana Agent are EOL; Alloy is
  # the supported collector, so log collection converges on Alloy.
  - name: alloy-logs
    namespace: monitoring
    chart: grafana/alloy
    version: 1.10.0
    needs:
      - monitoring/loki
    values:
      - ../values/alloy-logs.yaml

  # 7. Pyroscope (Continuous Profiling)
  # Continuous code profiling (CPU / heap flame graphs) - the open-source
  # equivalent of Datadog Continuous Profiler / New Relic CodeStream profiling,
  # which are paid add-ons there and free here.
  - name: pyroscope
    namespace: monitoring
    chart: grafana/pyroscope
    version: 2.1.0
    values:
      - ../values/pyroscope.yaml

  # 8. Blackbox exporter (synthetic / uptime monitoring)
  # Probes the demo services from outside and exposes up/down + latency, the
  # open-source counterpart to Datadog/New Relic Synthetics. Prometheus scrapes
  # it via the blackbox-http job in values/prometheus.yaml.
  - name: blackbox-exporter
    namespace: monitoring
    chart: prometheus-community/prometheus-blackbox-exporter
    version: 11.13.0
    values:
      - ../values/blackbox-exporter.yaml

  # 9. Grafana Alloy - unified telemetry gateway (Deployment)  [FASE 2]
  # Receives Real User Monitoring data from the browser (Grafana Faro Web SDK)
  # AND the backend OTLP pipeline (products/orders/shipping), replacing the
  # former otel-collector Deployment entirely. One process: faro.receiver +
  # otelcol.receiver.otlp -> k8sattributes -> tail_sampling -> batch ->
  # Tempo/Prometheus(remote_write, with exemplars)/Loki. See values/alloy.yaml
  # for the full pipeline and the exemplars migration notes.
  - name: alloy
    namespace: monitoring
    chart: grafana/alloy
    version: 1.10.0
    needs:
      - monitoring/loki
      - monitoring/tempo
      - monitoring/prometheus
    values:
      - ../values/alloy.yaml
