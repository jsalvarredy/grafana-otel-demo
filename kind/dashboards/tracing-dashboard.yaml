            "h": 1,
            "w": 24,
            "x": 0,
            "y": 38
          },
          "panels": []
        },
        {
          "id": 12,
          "type": "table",
          "title": "Recent errors (all services)",
          "description": "Every errored trace; click to open the waterfall and pivot to logs.",
          "datasource": {
            "type": "tempo",
            "uid": "Tempo"
          },
          "gridPos": {
            "h": 9,
            "w": 12,
            "x": 0,
            "y": 39
          },
          "options": {
            "cellHeight": "sm",
            "showHeader": true,
            "sortBy": [
              {
                "desc": true,
                "displayName": "Start time"
              }
            ]
          },
          "targets": [
            {
              "datasource": {
                "type": "tempo",
                "uid": "Tempo"
              },
              "queryType": "traceql",
              "query": "{ status = error }",
              "refId": "A",
              "limit": 20,
              "tableType": "traces"
            }
          ]
        },
        {
          "id": 13,
          "type": "table",
          "title": "Slowest traces (> 100ms)",
          "description": "Slowest traces across the platform.",
