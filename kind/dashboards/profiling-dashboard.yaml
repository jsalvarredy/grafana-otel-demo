apiVersion: v1
kind: ConfigMap
metadata:
  name: profiling-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: '1'
data:
  profiling.json: "{\n  \"annotations\": {\n    \"list\": [\n      {\n        \"builtIn\": 1,\n        \"datasource\": {\n          \"type\": \"grafana\",\n          \"uid\": \"-- Grafana --\"\n        },\n        \"enable\": true,\n        \"hide\": true,\n        \"iconColor\": \"rgba(0, 211, 255, 1)\",\n        \"name\": \"Annotations & Alerts\",\n        \"type\": \"dashboard\"\n      }\n    ]\n  },\n  \"description\": \"Continuous profiling (CPU flame graphs) powered by Pyroscope. The open-source equivalent of Datadog Continuous Profiler / New Relic profiling, which are paid add-ons there and free here.\",\n  \"editable\": true,\n  \"graphTooltip\": 1,\n  \"links\": [\n    {\n      \"asDropdown\": true,\n      \"icon\": \"external link\",\n      \"includeVars\": true,\n      \"keepTime\": true,\n      \"tags\": [\n        \"apm\"\n      ],\n      \"targetBlank\": false,\n      \"title\": \"APM Dashboards\",\n      \"tooltip\": \"Jump to another dashboard\",\n      \"type\": \"dashboards\",\n      \"url\": \"\"\n    }\n  ],\n  \"panels\": [\n    {\n      \"gridPos\": {\n        \"h\": 3,\n        \"w\": 24,\n        \"x\": 0,\n        \"y\": 0\n      },\n      \"id\": 1,\n      \"options\": {\n        \"code\": {\n          \"language\": \"html\",\n          \"showLineNumbers\": false,\n          \"showMiniMap\": false\n        },\n        \"content\": \"<div style=\\\"padding:6px 0\\\">\\n  <div style=\\\"font-size:24px;font-weight:700;color:#fff\\\">Continuous Profiling</div>\\n  <div style=\\\"font-size:13px;color:#8e8e8e;margin-top:4px\\\">CPU flame graphs from <strong style=\\\"color:#F5A623\\\">Pyroscope</strong> for <strong>products-service</strong>. Find which functions burn CPU, down to the line, continuously and in production. This is a paid add-on in Datadog/New Relic; here it ships with the stack.</div>\\n</div>\",\n        \"mode\": \"html\"\n      },\n      \"transparent\": true,\n      \"type\": \"text\"\n    },\n    {\n      \"datasource\": {\n        \"type\": \"grafana-pyroscope-datasource\",\n        \"uid\": \"Pyroscope\"\n      },\n      \"description\": \"CPU time flame graph for products-service. Wider frames = more CPU spent in that call path.\",\n      \"gridPos\": {\n        \"h\": 20,\n        \"w\": 24,\n        \"x\": 0,\n        \"y\": 3\n      },\n      \"id\": 2,\n      \"options\": {},\n      \"targets\": [\n        {\n          \"datasource\": {\n            \"type\": \"grafana-pyroscope-datasource\",\n            \"uid\": \"Pyroscope\"\n          },\n          \"groupBy\": [],\n          \"labelSelector\": \"{service_name=\\\"products-service\\\"}\",\n          \"profileTypeId\": \"wall:wall:nanoseconds:wall:nanoseconds\",\n          \"queryType\": \"profile\",\n          \"refId\": \"A\"\n        }\n      ],\n      \"title\": \"products-service - CPU/Wall Flame Graph\",\n      \"type\": \"flamegraph\"\n    }\n  ],\n  \"refresh\": \"30s\",\n  \"schemaVersion\": 38,\n  \"style\": \"dark\",\n  \"tags\": [\n    \"apm\",\n    \"opentelemetry\",\n    \"otel\",\n    \"profiling\",\n    \"pyroscope\"\n  ],\n  \"templating\": {\n    \"list\": []\n  },\n  \"time\": {\n    \"from\": \"now-1h\",\n    \"to\": \"now\"\n  },\n  \"timezone\": \"\",\n  \"title\": \"APM - Continuous Profiling\",\n  \"uid\": \"apm-profiling\",\n  \"version\": 1,\n  \"weekStart\": \"\",\n  \"timepicker\": {\n    \"refresh_intervals\": [\n      \"10s\",\n      \"30s\",\n      \"1m\",\n      \"5m\",\n      \"15m\",\n      \"1h\"\n    ],\n    \"time_options\": [\n      \"5m\",\n      \"15m\",\n      \"30m\",\n      \"1h\",\n      \"3h\",\n      \"6h\",\n      \"12h\",\n      \"24h\"\n    ]\n  }\n}"
