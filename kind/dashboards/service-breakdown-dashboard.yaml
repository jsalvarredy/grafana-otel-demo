apiVersion: v1
kind: ConfigMap
metadata:
  name: service-breakdown-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: '1'
data:
  service-breakdown.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          },
          {
            "datasource": {
              "type": "prometheus",
              "uid": "Prometheus"
            },
            "enable": true,
            "expr": "ALERTS{alertstate=\"firing\"}",
            "hide": false,
            "iconColor": "red",
            "name": "Firing alerts",
            "titleFormat": "{{alertname}}",
            "useValueForTime": false
          },
          {
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": false,
            "iconColor": "red",
            "name": "Deploys & Incidents",
            "target": {
              "limit": 100,
              "matchAny": true,
              "tags": [
                "deploy",
                "incident"
              ],
              "type": "tags"
            }
          }
        ]
      },
      "description": "New Relic-style transaction time breakdown per service: response time split into App, PostgreSQL, Redis, MongoDB and External services, derived from OpenTelemetry span metrics (db.system) in Tempo. Pick a service with the Service variable.",
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [
        {
          "asDropdown": true,
          "icon": "external link",
          "includeVars": true,
          "keepTime": true,
          "tags": [
            "apm"
          ],
          "targetBlank": false,
          "title": "APM Dashboards",
          "tooltip": "Jump to another dashboard",
          "type": "dashboards",
          "url": ""
        }
      ],
      "liveNow": false,
      "panels": [
        {
          "gridPos": {
            "x": 0,
            "y": 0,
            "w": 24,
            "h": 3
          },
          "id": 1,
          "transparent": true,
          "type": "text",
          "options": {
            "mode": "html",
            "code": {
              "language": "html",
              "showLineNumbers": false,
              "showMiniMap": false
            },
            "content": "<div style=\"display:flex;align-items:center;gap:18px;padding:8px 4px\">\n  <div style=\"width:10px;height:46px;background:linear-gradient(180deg,#F46800,#8F3BB8);border-radius:3px\"></div>\n  <div>\n    <div style=\"font-size:26px;font-weight:800;color:#fff\">Service Time Breakdown</div>\n    <div style=\"font-size:13px;color:#9aa0a6;margin-top:2px\">Where does the response time go? Response time split into <b>App</b> &middot; <b>PostgreSQL</b> &middot; <b>Redis</b> &middot; <b>MongoDB</b> &middot; <b>External</b> &mdash; the New Relic transaction-breakdown view, on OpenTelemetry span metrics. Pick a <b>Service</b> above.</div>\n  </div>\n  <div style=\"margin-left:auto;text-align:right;font-size:12px;color:#9aa0a6\">App = server time &minus; time in dependencies<br/>Tempo span metrics &rarr; Prometheus</div>\n</div>"
          }
        },
        {
          "collapsed": false,
          "gridPos": {
            "x": 0,
            "y": 3,
            "w": 24,
            "h": 1
          },
          "id": 2,
          "panels": [],
          "title": "Service summary",
          "type": "row"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "Prometheus"
          },
          "id": 3,
          "title": "Avg response time",
          "type": "stat",
          "gridPos": {
            "x": 0,
            "y": 4,
            "w": 6,
            "h": 4
          },
          "fieldConfig": {
            "defaults": {
              "unit": "ms",
              "decimals": 1,
              "color": {
                "mode": "thresholds",
                "fixedColor": "text"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 250
                  },
                  {
                    "color": "red",
                    "value": 1000
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "Prometheus"
              },
              "expr": "1000 * sum(rate(traces_spanmetrics_latency_sum{service=~\"$service\",span_kind=\"SPAN_KIND_SERVER\"}[$__rate_interval])) / clamp_min(sum(rate(traces_spanmetrics_calls_total{service=~\"$service\",span_kind=\"SPAN_KIND_SERVER\"}[$__rate_interval])), 0.001)",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "Prometheus"
          },
          "id": 4,
          "title": "Throughput",
          "type": "stat",
          "gridPos": {
            "x": 6,
            "y": 4,
            "w": 6,
            "h": 4
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "decimals": 0,
              "color": {
                "mode": "fixed",
                "fixedColor": "text"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "text",
                    "value": null
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
