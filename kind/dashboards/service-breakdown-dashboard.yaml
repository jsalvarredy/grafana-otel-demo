              "expr": "100 * clamp_min(sum(rate(traces_spanmetrics_latency_sum{service=~\"$service\",span_kind=\"SPAN_KIND_SERVER\"}[$__rate_interval])) - sum(rate(traces_spanmetrics_latency_sum{service=~\"$service\",db_system=~\"postgresql|redis|mongodb\"}[$__rate_interval])) - sum(rate(traces_spanmetrics_latency_sum{service=~\"$service\",span_kind=\"SPAN_KIND_CLIENT\",db_system=\"\"}[$__rate_interval])), 0) / clamp_min(sum(rate(traces_spanmetrics_latency_sum{service=~\"$service\",span_kind=\"SPAN_KIND_SERVER\"}[$__rate_interval])), 0.0000001)",
              "refId": "A"
            }
          ]
