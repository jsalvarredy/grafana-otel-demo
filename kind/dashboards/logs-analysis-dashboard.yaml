    \n          },\n          \"editorMode\": \"code\",\n          \"expr\": \"{service_name=\\\"products-service\\\"} |= \\\"${search}\\\"\",\n          \"queryType\": \"range\",\n          \"refId\": \"A\"\n        }\n      ],\n      \"title\": \"Live Logs: products-service\",\n      \"type\": \"logs\"\n    },\n    {\n      \"collapsed\": false,\n      \"gridPos\": {\n        \"h\": 1,\n        \"w\": 24,\n        \"x\": 0,\n        \"y\": 32\n      },\n      \"id\": 7,\n      \"panels\": [],\n      \"title\": \"shipping-service (Beyla eBPF)\",\n      \"type\": \"row\"\n    },\n    {\n      \"datasource\": {\n        \"type\": \"loki\",\n        \"uid\": \"${datasource}\"\n      },\n      \"description\": \"Live log stream from shipping-service (Java with Beyla auto-instrumentation)\",\n      \"gridPos\": {\n        \"h\": 10,\n        \"w\": 24,\n        \"x\": 0,\n        \"y\": 33\n      },\n      \"id\": 8,\n      \"options\": {\n        \"dedupStrategy\": \"none\",\n        \"enableLogDetails\": true,\n        \"prettifyLogMessage\": true,\n        \"showCommonLabels\": false,\n        \"showLabels\": false,\n        \"showTime\": true,\n        \"sortOrder\": \"Descending\",\n        \"wrapLogMessage\": false\n      },\n      \"targets\": [\n        {\n          \"datasource\": {\n            \"type\": \"loki\",\n            \"uid\": \"${datasource}\"\n          },\n          \"editorMode\": \"code\",\n          \"expr\": \"{service_name=\\\"shipping-service\\\"} |= \\\"${search}\\\"\",\n          \"queryType\": \"range\",\n          \"refId\": \"A\"\n        }\n      ],\n      \"title\": \"Live Logs: shipping-service\",\n      \"type\": \"logs\"\n    }\n  ],\n  \"schemaVersion\": 38,\n  \"style\": \"dark\",\n  \"tags\": [\n    \"apm\",\n    \"logs\",\n    \"loki\",\n    \"opentelemetry\",\n    \"otel\"\n  ],\n  \"templating\": {\n    \"list\": [\n      {\n        \"current\": {\n          \"selected\": false,\n          \"text\": \"Loki\",\n          \"valu