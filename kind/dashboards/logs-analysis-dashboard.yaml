data:
  logs-analysis.json: "{\n  \"annotations\": {\n    \"list\": [\n      {\n        \"builtIn\": 1,\n        \"datasource\": {\n          \"type\": \"grafana\",\n          \"uid\": \"-- Grafana --\"\n        },\n        \"enable\": true,\n        \"hide\": true,\n        \"iconColor\": \"rgba(0, 211, 255, 1)\",\n        \"name\": \"Annotations & Alerts\",\n        \"type\": \"dashboard\"\n      }\n    ]\n  },\n  \"description\": \"Unified log analysis powered by Loki. View traffic patterns, errors, and live log streams from all services.\",\n  \"editable\": true,\n  \"fiscalYearStartMonth\": 0,\n  \"graphTooltip\": 1,\n  \"id\": null,\n  \"links\": [\n    {\n      \"asDropdown\": true,\n      \"icon\": \"external link\",\n      \"includeVars\": true,\n      \"keepTime\": true,\n      \"tags\": [\n        \"apm\"\n      ],\n      \"targetBlank\": false,\n      \"title\": \"APM Dashboards\",\n      \"tooltip\": \"Jump to another dashboard\",\n      \"type\": \"dashboards\",\n      \"url\": \"\"\n    }\n  ],\n  \"liveNow\": false,\n  \"panels\": [\n    {\n      \"gridPos\": {\n        \"h\": 3,\n        \"w\": 24,\n        \"x\": 0,\n        \"y\": 0\n      },\n      \"id\": 1,\n      \"options\": {\n        \"code\": {\n          \"language\": \"markdown\",\n          \"showLineNumbers\": false,\n          \"showMiniMap\": false\n        },\n        \"content\": \"<div style=\\\"padding:6px 0\\\">\\n  <div style=\\\"font-size:24px;font-weight:700;color:#fff\\\">Unified Logs & Traffic Analysis</div>\\n  <div style=\\\"font-size:13px;color:#8e8e8e;margin-top:4px\\\">Powered by <strong style=\\\"color:#1F60C4\\\">Loki</strong> &mdash; Use the <strong>Search Logs</strong> field above to filter by TraceID, UserID, or error messages</div>\\n</div>\",\n        \"mode\": \"html\"\n      },\n      \"transparent\": true,\n      \"type\": \"text\"\n    },\n    {\n      \"datasource\": {\n        \"type\": \"loki\",\n        \"uid\": \"${datasource}\"\n      },\n      \"description\": \"Stacked bars: Green = Normal Traffic, Red = Errors (500s/Exceptions)\",\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"color\": {\n            \"mode\": \"palette-classic\"\n          },\n          \"custom\": {\n            \"axisCenteredZero\": false,\n            \"axisColorMode\": \"text\",\n            \"axisLabel\": \"\",\n            \"axisPlacement\": \"auto\",\n            \"barAlignment\": 0,\n            \"drawStyle\": \"bars\",\n            \"fillOpacity\": 80,\n            \"gradientMode\": \"none\",\n            \"hideFrom\": {\n              \"legend\": false,\n              \"tooltip\": false,\n              \"viz\": false\n            },\n            \"lineInterpolation\": \"linear\",\n            \"lineWidth\": 1,\n            \"pointSize\": 5,\n            \"scaleDistribution\": {\n              \"type\": \"linear\"\n            },\n            \"showPoints\": \"auto\",\n            \"spanNulls\": false,\n            \"stacking\": {\n              \"group\": \"A\",\n              \"mode\": \"normal\"\n            },\n            \"thresholdsStyle\": {\n              \"mode\": \"off\"\n            }\n          },\n          \"mappings\": [],\n          \"thresholds\": {\n            \"mode\": \"absolute\",\n            \"steps\": [\n              {\n                \"color\": \"green\",\n                \"value\": null\n              }\n            ]\n          }\n        },\n        \"overrides\": [\n          {\n            \"matcher\": {\n              \"id\": \"byName\",\n              \"options\": \"Errors (Exceptions/Failures)\"\n            },\n            \"properties\": [\n              {\n                \"id\": \"color\",\n                \"value\": {\n                  \"fixedColor\": \"#F2495C\",\n                  \"mode\": \"fixed\"\n                }\n              }\n            ]\n          },\n          {\n            \"matcher\": {\n              \"id\": \"byName\",\n              \"options\": \"Normal Traffic (Info/Debug)\"\n            },\n            \"properties\": [\n              {\n            \
    \    \"id\": \"color\",\n                \"value\": {\n                  \"fixedColor\": \"#37872D\",\n                  \"mode\": \"fixed\"\n                }\n              }\n            ]\n          }\n        ]\n      },\n      \"gridPos\": {\n        \"h\": 7,\n        \"w\": 24,\n        \"x\": 0,\n        \"y\": 3\n      },\n      \"id\": 2,\n      \"options\": {\n        \"legend\": {\n          \"calcs\": [],\n          \"displayMode\": \"list\",\n          \"placement\": \"bottom\",\n          \"showLegend\": true\n        },\n        \"tooltip\": {\n          \"mode\": \"multi\",\n          \"sort\": \"none\"\n        }\n      },\n      \"targets\": [\n        {\n          \"datasource\": {\n            \"type\": \"loki\",\n            \"uid\": \"${datasource}\"\n          },\n          \"editorMode\": \"code\",\n          \"expr\": \"sum(count_over_time({service_name=~\\\"orders-service|products-service|shipping-service\\\"} |= \\\"${search}\\\" !~ \\\"(?i)error|exception|fail\\\" [$__interval]))\",\n          \"legendFormat\": \"Normal Traffic (Info/Debug)\",\n          \"queryType\": \"range\",\n          \"refId\": \"A\"\n        },\n        {\n          \"datasource\": {\n            \"type\": \"loki\",\n            \"uid\": \"${datasource}\"\n          },\n          \"editorMode\": \"code\",\n          \"expr\": \"sum(count_over_time({service_name=~\\\"orders-service|products-service|shipping-service\\\"} |= \\\"${search}\\\" |~ \\\"(?i)error|exception|fail\\\" [$__interval]))\",\n          \"legendFormat\": \"Errors (Exceptions/Failures)\",\n          \"queryType\": \"range\",\n          \"refId\": \"B\"\n        }\n      ],\n      \"title\": \"Global Traffic Volume & Health\",\n      \"type\": \"timeseries\"\n    },\n    {\n      \"collapsed\": false,\n      \"gridPos\": {\n        \"h\": 1,\n        \"w\": 24,\n        \"x\": 0,\n        \"y\": 10\n      },\n      \"id\": 3,\n      \"panels\": [],\n      \"title\": \"orders-service\",\n     