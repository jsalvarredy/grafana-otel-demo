              },
              "editorMode": "code",
              "expr": "sum by (service) (rate(traces_spanmetrics_calls_total{service=~\"$service\",span_kind=\"SPAN_KIND_SERVER\"}[$__rate_interval])) * 60",
              "legendFormat": "current {{service}}",
