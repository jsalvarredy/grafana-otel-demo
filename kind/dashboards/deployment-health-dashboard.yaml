          "gridPos": {
            "x": 0,
            "y": 7,
            "w": 24,
            "h": 7
          },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "align": "auto",
                "cellOptions": {
                  "type": "auto"
                },
                "filterable": true
              },
              "mappings": []
            },
            "overrides": []
          },
          "options": {
            "cellHeight": "sm",
            "showHeader": true
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "Prometheus"
              },
              "editorMode": "code",
              "expr": "max by (deployment, label_observability_grafana_com_service_name, label_app_kubernetes_io_version, label_observability_grafana_com_environment) (kube_deployment_labels{namespace=~\"$namespace\",deployment=~\"$deployment\",label_observability_grafana_com_service_name!=\"\"})",
              "format": "table",
              "instant": true,
              "refId": "A"
            }
          ],
          "transformations": [
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "Time": true,
                  "Value": true
                },
                "renameByName": {
                  "deployment": "Kubernetes Deployment",
                  "label_observability_grafana_com_service_name": "Service",
                  "label_app_kubernetes_io_version": "Version",
                  "label_observability_grafana_com_environment": "Environment"
                }
              }
            }
          ]
