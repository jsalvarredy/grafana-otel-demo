apiVersion: v1
kind: ConfigMap
metadata:
  name: deployment-health-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: '1'
data:
  deployment-health.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          },
          {
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": false,
            "iconColor": "#5794F2",
            "name": "Deployments",
            "target": {
              "limit": 200,
              "matchAny": true,
              "tags": [
                "deployment"
              ],
              "type": "tags"
            }
          },
          {
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": false,
            "iconColor": "#F2495C",
            "name": "Incidents",
            "target": {
              "limit": 200,
              "matchAny": true,
              "tags": [
                "incident"
              ],
              "type": "tags"
            }
          },
          {
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": false,
            "iconColor": "#73BF69",
            "name": "Recoveries",
            "target": {
              "limit": 200,
              "matchAny": true,
              "tags": [
                "recovery"
              ],
              "type": "tags"
            }
          },
          {
            "datasource": {
              "type": "prometheus",
              "uid": "Prometheus"
            },
            "enable": true,
            "expr": "changes(kube_deployment_status_observed_generation{namespace=~\"$namespace\",deployment=~\"$deployment\"}[2m]) > 0",
            "hide": true,
            "iconColor": "#8AB8FF",
            "name": "Kubernetes rollout observed (fallback)",
            "step": "60s",
            "titleFormat": "Rollout observed: {{deployment}}",
            "useValueForTime": false
          }
        ]
      },
      "description": "Correlate unique-by-default release identity and Kubernetes rollout health with user impact over current and historical-offset windows.",
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [
        {
          "asDropdown": true,
          "icon": "external link",
          "includeVars": true,
          "keepTime": true,
          "tags": [
            "apm"
          ],
          "targetBlank": false,
          "title": "APM Dashboards",
          "tooltip": "Continue the investigation",
          "type": "dashboards",
          "url": ""
        },
        {
          "icon": "external link",
          "includeVars": true,
          "keepTime": true,
          "targetBlank": false,
          "title": "Distributed Tracing",
          "type": "link",
          "url": "/d/super-traces-poc-v1"
        },
        {
          "icon": "external link",
          "includeVars": true,
          "keepTime": true,
          "targetBlank": false,
          "title": "Logs",
          "type": "link",
          "url": "/d/bdyaonwx23e2oc"
        }
      ],
      "panels": [
        {
          "id": 1,
          "type": "text",
          "transparent": true,
          "gridPos": {
            "x": 0,
            "y": 0,
            "w": 24,
            "h": 3
          },
          "options": {
            "mode": "html",
            "content": "<div style=\"display:flex;align-items:center;gap:18px;padding:8px 4px\"><div style=\"width:10px;height:46px;background:linear-gradient(180deg,#5794F2,#73BF69);border-radius:3px\"></div><div><div style=\"font-size:26px;font-weight:800;color:#fff\">Deployment Health</div><div style=\"font-size:13px;color:#9aa0a6;margin-top:2px\">Release identity · rollout health · current vs historical-offset service impact. Blue markers are real deployments; red regions are incident simulations.</div></div><div style=\"margin-left:auto;text-align:right;font-size:12px;color:#9aa0a6\">Version: image tag = K8s label = OTel/Faro<br/>Historical offset is selectable above</div></div>"
          }
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Available replicas",
          "description": "Fraction of desired deployment replicas currently available.",
          "datasource": {
            "type": "prometheus",
            "uid": "Prometheus"
          },
          "gridPos": {
            "x": 0,
            "y": 3,
            "w": 6,
            "h": 4
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "mappings": [],
              "unit": "percentunit",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "orange",
                    "value": 0.8
                  },
                  {
                    "color": "green",
                    "value": 1
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "value",
            "wideLayout": true
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "Prometheus"
              },
              "editorMode": "code",
              "expr": "sum(kube_deployment_status_replicas_available{namespace=~\"$namespace\",deployment=~\"$deployment\"}) / clamp_min(sum(kube_deployment_spec_replicas{namespace=~\"$namespace\",deployment=~\"$deployment\"}), 1)",
              "instant": true,
              "refId": "A"
            }
          ]
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Updated replicas",
          "description": "Fraction of desired replicas already on the newest ReplicaSet.",
          "datasource": {
            "type": "prometheus",
            "uid": "Prometheus"
          },
          "gridPos": {
            "x": 6,
            "y": 3,
            "w": 6,
            "h": 4
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "mappings": [],
              "unit": "percentunit",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "orange",
                    "value": 0.8
                  },
                  {
                    "color": "green",
                    "value": 1
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "value",
            "wideLayout": true
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "Prometheus"
              },
              "editorMode": "code",
              "expr": "sum(kube_deployment_status_replicas_updated{namespace=~\"$namespace\",deployment=~\"$deployment\"}) / clamp_min(sum(kube_deployment_spec_replicas{namespace=~\"$namespace\",deployment=~\"$deployment\"}), 1)",
              "instant": true,
              "refId": "A"
            }
          ]
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Container restarts",
          "description": "Restarts in the selected dashboard time range.",
          "datasource": {
            "type": "prometheus",
            "uid": "Prometheus"
          },
          "gridPos": {
            "x": 12,
            "y": 3,
            "w": 6,
            "h": 4
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "mappings": [],
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "orange",
                    "value": 1
                  },
                  {
                    "color": "red",
                    "value": 3
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "value",
            "wideLayout": true
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "Prometheus"
              },
              "editorMode": "code",
              "expr": "sum(increase(kube_pod_container_status_restarts_total{namespace=~\"$namespace\"}[$__range])) or vector(0)",
              "instant": true,
              "refId": "A"
            }
          ]
        },
        {
          "id": 5,
          "type": "stat",
          "title": "Synthetic success",
          "description": "Worst current blackbox health probe for demo services.",
          "datasource": {
            "type": "prometheus",
            "uid": "Prometheus"
          },
          "gridPos": {
            "x": 18,
            "y": 3,
            "w": 6,
            "h": 4
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "mappings": [],
              "unit": "percentunit",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "green",
                    "value": 1
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
