          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "Prometheus"
              },
              "editorMode": "code",
              "expr": "min(probe_success{instance=~\".*demo.svc.*\"})",
              "instant": true,
              "refId": "A"
            }
          ]
        },
        {
          "id": 6,
          "type": "table",
          "title": "Current release identity",
