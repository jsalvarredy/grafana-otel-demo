apiVersion: v1
kind: ConfigMap
metadata:
  name: k6-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: '1'
data:
  k6.json: |
    {
      "uid": "k6-load-testing",
      "title": "k6 Load Testing",
      "tags": [
        "apm",
        "k6",
        "load-testing"
      ],
      "timezone": "",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "10s",
      "time": {
        "from": "now-15m",
        "to": "now"
      },
      "editable": true,
      "graphTooltip": 1,
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          },
          {
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": false,
            "iconColor": "red",
            "name": "Deploys & Incidents",
            "target": {
              "limit": 100,
              "matchAny": true,
              "tags": [
                "deploy",
                "incident"
              ],
              "type": "tags"
            }
          }
        ]
      },
      "templating": {
        "list": []
      },
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Total requests",
          "datasource": {
            "type": "prometheus",
            "uid": "Prometheus"
          },
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 0,
            "y": 0
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "blue",
                    "value": null
                  }
                ]
              },
              "color": {
                "mode": "thresholds"
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "colorMode": "value",
            "graphMode": "area",
            "textMode": "auto"
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "Prometheus"
              },
              "editorMode": "code",
              "expr": "sum(k6_http_reqs_total)",
              "legendFormat": "",
              "range": true
            }
          ]
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Max VUs",
          "datasource": {
            "type": "prometheus",
            "uid": "Prometheus"
          },
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 6,
            "y": 0
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "blue",
                    "value": null
                  }
                ]
              },
              "color": {
                "mode": "thresholds"
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "colorMode": "value",
            "graphMode": "area",
            "textMode": "auto"
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "Prometheus"
              },
              "editorMode": "code",
              "expr": "max(k6_vus_max)",
              "legendFormat": "",
              "range": true
            }
          ]
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Response time p95",
          "datasource": {
            "type": "prometheus",
            "uid": "Prometheus"
          },
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 12,
            "y": 0
          },
          "fieldConfig": {
            "defaults": {
              "unit": "ms",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "orange",
                    "value": 500
                  },
                  {
                    "color": "red",
                    "value": 800
                  }
                ]
              },
              "color": {
                "mode": "thresholds"
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "colorMode": "value",
            "graphMode": "area",
            "textMode": "auto"
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "Prometheus"
              },
              "editorMode": "code",
              "expr": "max(k6_http_req_duration_p95)",
              "legendFormat": "",
              "range": true
            }
          ]
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Failed request rate",
          "datasource": {
            "type": "prometheus",
            "uid": "Prometheus"
          },
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 18,
            "y": 0
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "orange",
                    "value": 0.05
                  },
                  {
                    "color": "red",
                    "value": 0.1
                  }
                ]
              },
              "color": {
                "mode": "thresholds"
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "colorMode": "value",
            "graphMode": "area",
            "textMode": "auto"
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "Prometheus"
              },
              "editorMode": "code",
              "expr": "max(k6_http_req_failed_rate)",
              "legendFormat": "",
              "range": true
            }
          ]
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "Request rate by endpoint",
          "datasource": {
            "type": "prometheus",
            "uid": "Prometheus"
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 4
          },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": {
                "drawStyle": "line",
                "lineWidth": 2,
                "fillOpacity": 10,
                "showPoints": "never"
              },
              "color": {
                "mode": "palette-classic"
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "Prometheus"
              },
              "editorMode": "code",
              "expr": "sum by (name) (rate(k6_http_reqs_total[1m]))",
              "legendFormat": "{{name}}",
              "range": true
            }
          ]
        },
        {
          "id": 6,
          "type": "timeseries",
          "title": "Virtual users & iteration rate",
          "datasource": {
            "type": "prometheus",
            "uid": "Prometheus"
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 4
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": {
                "drawStyle": "line",
                "lineWidth": 2,
                "fillOpacity": 10,
                "showPoints": "never"
              },
              "color": {
                "mode": "palette-classic"
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "Prometheus"
              },
              "editorMode": "code",
              "expr": "k6_vus",
              "legendFormat": "active VUs",
              "range": true
            },
            {
              "refId": "B",
              "datasource": {
                "type": "prometheus",
                "uid": "Prometheus"
              },
              "editorMode": "code",
              "expr": "sum(rate(k6_iterations_total[1m]))",
              "legendFormat": "iterations/s",
              "range": true
            }
          ]
        },
        {
          "id": 7,
          "type": "timeseries",
          "title": "Response time (k6 client-side)",
          "datasource": {
            "type": "prometheus",
            "uid": "Prometheus"
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 12
          },
          "fieldConfig": {
            "defaults": {
              "unit": "ms",
              "custom": {
                "drawStyle": "line",
                "lineWidth": 2,
                "fillOpacity": 10,
                "showPoints": "never",
                "thresholdsStyle": {
                  "mode": "line"
                }
              },
              "color": {
                "mode": "palette-classic"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "red",
                    "value": 800
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "Prometheus"
              },
              "editorMode": "code",
              "expr": "max(k6_http_req_duration_p95)",
              "legendFormat": "p95",
              "range": true
            },
            {
              "refId": "B",
              "datasource": {
                "type": "prometheus",
                "uid": "Prometheus"
              },
              "editorMode": "code",
              "expr": "max(k6_http_req_duration_p99)",
              "legendFormat": "p99",
              "range": true
            },
            {
              "refId": "C",
              "datasource": {
                "type": "prometheus",
                "uid": "Prometheus"
              },
              "editorMode": "code",
              "expr": "max(k6_http_req_duration_avg)",
              "legendFormat": "avg",
              "range": true
            }
          ]
        },
        {
          "id": 8,
          "type": "timeseries",
          "title": "Failed request rate",
          "datasource": {
            "type": "prometheus",
            "uid": "Prometheus"
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 12
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "custom": {
                "drawStyle": "line",
                "lineWidth": 2,
                "fillOpacity": 10,
                "showPoints": "never",
                "thresholdsStyle": {
                  "mode": "line"
                }
              },
              "color": {
                "mode": "palette-classic"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "red",
                    "value": 0.1
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "Prometheus"
              },
              "editorMode": "code",
              "expr": "max(k6_http_req_failed_rate)",
              "legendFormat": "failed rate",
              "range": true
            }
          ]
        },
        {
          "id": 9,
          "type": "timeseries",
          "title": "Network throughput",
          "datasource": {
            "type": "prometheus",
            "uid": "Prometheus"
          },
          "gridPos": {
            "h": 6,
            "w": 24,
            "x": 0,
            "y": 20
          },
          "fieldConfig": {
            "defaults": {
              "unit": "binBps",
              "custom": {
                "drawStyle": "line",
                "lineWidth": 2,
                "fillOpacity": 10,
                "showPoints": "never"
              },
              "color": {
                "mode": "palette-classic"
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "Prometheus"
              },
              "editorMode": "code",
              "expr": "rate(k6_data_sent_total[1m])",
              "legendFormat": "sent",
              "range": true
            },
            {
              "refId": "B",
              "datasource": {
                "type": "prometheus",
                "uid": "Prometheus"
              },
              "editorMode": "code",
              "expr": "rate(k6_data_received_total[1m])",
              "legendFormat": "received",
              "range": true
