# Grafana Alloy - node log collector (DaemonSet).
# ---------------------------------------------------------------------------
# FASE 1 of the Alloy consolidation: this release REPLACES the old
# `otel-logs-agent` (an OpenTelemetry Collector DaemonSet). It tails every
# pod's logs and ships them to Loki, reproducing the exact labels the Loki
# dashboards rely on (service_name, service_namespace, k8s_*).
#
# Why Alloy: Promtail is End-of-Life (2026-03-02) and Grafana Agent EOL
# (2025-11-01); Alloy is Grafana's supported, go-forward telemetry collector.
# All log collection now converges on Alloy.
#
# CRITICAL: shipping-service (Java) writes classic stdout logs (its logback
# pattern has no trace ids). This node agent is what guarantees those logs
# land in Loki labelled service_name="shipping-service", so the Log Analysis /
# Logs Search dashboards keep working regardless of what the OTel Java agent
# ships over OTLP. The `service_name` label mapping below MUST stay intact.
#
# Log source: `loki.source.kubernetes` reads pod logs via the Kubernetes API
# (kubelet), so NO host-path mounts are needed. RBAC (pods, pods/log,
# namespaces) is granted by the chart's default ClusterRole (rbac.create).
# The classic file-based tailing (loki.source.file over /var/log/pods) is the
# alternative if API streaming ever becomes a bottleneck.

controller:
  type: daemonset

alloy:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

  configMap:
    content: |-
      // -------------------------------------------------------------------
      // Discover every pod in the cluster.
      // -------------------------------------------------------------------
      discovery.kubernetes "pods" {
        role = "pod"
      }

      // -------------------------------------------------------------------
      // Preserve the canonical observability identity added by the app charts.
      // The bounded version/environment labels are intentionally queryable for
      // post-deploy analysis; commit and deployment ID remain annotations only.
      // -------------------------------------------------------------------
      discovery.relabel "pod_logs" {
        targets = discovery.kubernetes.pods.targets

        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "k8s_namespace_name"
        }
        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "service_namespace"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "k8s_pod_name"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_container_name"]
          target_label  = "k8s_container_name"
        }
        rule {
          source_labels = ["__meta_kubernetes_node_name"]
          target_label  = "k8s_node_name"
        }
        // Canonical OTel service.name from the chart's bounded pod label.
        rule {
          source_labels = ["__meta_kubernetes_pod_label_observability_grafana_com_service_name"]
          target_label  = "service_name"
        }
        // Fallback for infrastructure/third-party pods without that label.
        rule {
          source_labels = ["service_name", "__meta_kubernetes_pod_label_app_kubernetes_io_name"]
          separator     = ";"
          regex         = "^;(.*)$"
          replacement   = "$1"
          target_label  = "service_name"
        }
        rule {
          source_labels = ["service_name", "__meta_kubernetes_pod_container_name"]
          separator     = ";"
          regex         = "^;(.*)$"
          replacement   = "$1"
          target_label  = "service_name"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_version"]
          target_label  = "service_version"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_label_observability_grafana_com_environment"]
          target_label  = "deployment_environment_name"
        }
      }

      // -------------------------------------------------------------------
      // Tail the discovered pods (via the Kubernetes API) and push to Loki.
      // -------------------------------------------------------------------
      loki.source.kubernetes "pods" {
        targets    = discovery.relabel.pod_logs.output
        forward_to = [loki.write.default.receiver]
      }

      loki.write "default" {
        endpoint {
          url = "http://loki-gateway.monitoring.svc.cluster.local/loki/api/v1/push"
        }
      }
