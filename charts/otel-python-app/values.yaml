image:
  repository: otel-python-app
  pullPolicy: Never # Force using local image loaded into Kind
  tag: "latest"

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: true
  className: nginx
  hosts:
    - host: orders.127.0.0.1.nip.io
      paths:
        - path: /
          pathType: ImplementationSpecific

resources:
  limits:
    cpu: 250m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 96Mi

env:
  # OTEL Collector endpoint
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://alloy.monitoring.svc.cluster.local:4318"
  # Attach trace exemplars to histogram samples (metric -> trace correlation).
  OTEL_METRICS_EXEMPLAR_FILTER: "trace_based"
  # Products Service URL for inter-service communication
  PRODUCTS_SERVICE_URL: "http://otel-demo-app:8080"
