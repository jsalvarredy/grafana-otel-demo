apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "shipping-service.fullname" . }}
  labels:
    {{- include "shipping-service.labels" . | nindent 4 }}
  annotations:
    observability.grafana.com/revision: {{ .Values.observability.revision | quote }}
    observability.grafana.com/deployment-id: {{ .Values.observability.deploymentId | quote }}
    observability.grafana.com/deployed-at: {{ .Values.observability.deployedAt | quote }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "shipping-service.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "shipping-service.selectorLabels" . | nindent 8 }}
        {{- include "shipping-service.observabilityLabels" . | nindent 8 }}
      annotations:
        observability.grafana.com/revision: {{ .Values.observability.revision | quote }}
        observability.grafana.com/deployment-id: {{ .Values.observability.deploymentId | quote }}
        observability.grafana.com/deployed-at: {{ .Values.observability.deployedAt | quote }}
        {{- if .Values.beyla.enabled }}
        # Annotation to indicate Beyla auto-instrumentation
        instrumentation.beyla.io/enabled: "true"
        {{- end }}
    spec:
      {{- if .Values.beyla.enabled }}
      # Required for Beyla eBPF - share process namespace between containers
      shareProcessNamespace: true
      {{- end }}
      containers:
        # Main application container - Java Spring Boot.
        # Auto-instrumented by the OpenTelemetry Java agent (no code changes)
        # when instrumentation.javaAgent.enabled=true, or by the Beyla sidecar
        # below when beyla.enabled=true.
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          {{- $javaAgents := list }}
          {{- if .Values.instrumentation.javaAgent.enabled }}
          {{- $javaAgents = append $javaAgents (printf "-javaagent:%s" .Values.instrumentation.javaAgent.agentPath) }}
          {{- end }}
          {{- if .Values.profiling.pyroscope.enabled }}
          {{- $javaAgents = append $javaAgents (printf "-javaagent:%s" .Values.profiling.pyroscope.agentPath) }}
          {{- end }}
          {{- if or $javaAgents .Values.env }}
          env:
            {{- if $javaAgents }}
            # Attach the agents baked into the image (OTel telemetry and/or
            # Pyroscope profiling). The JVM picks up JAVA_TOOL_OPTIONS
            # automatically, so the app entrypoint is unchanged - still
            # "zero code change" auto-instrumentation.
            - name: JAVA_TOOL_OPTIONS
              value: {{ join " " $javaAgents | quote }}
            {{- end }}
            {{- if .Values.instrumentation.javaAgent.enabled }}
            - name: OTEL_SERVICE_NAME
              value: {{ .Values.observability.serviceName | quote }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.otel.endpoint | quote }}
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: "http/protobuf"
            # Prometheus needs cumulative temporality (not delta).
            - name: OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE
              value: "cumulative"
            - name: OTEL_TRACES_EXPORTER
              value: "otlp"
            - name: OTEL_METRICS_EXPORTER
              value: "otlp"
            - name: OTEL_LOGS_EXPORTER
              value: "otlp"
            # Stable OTel resource identity; unbounded deployment metadata stays
            # on Kubernetes/Grafana annotations, not on every telemetry item.
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "service.namespace={{ .Values.observability.serviceNamespace }},service.version={{ .Values.observability.version }},deployment.environment.name={{ .Values.observability.environment }}"
            {{- end }}
            {{- if .Values.profiling.pyroscope.enabled }}
            # Continuous profiling: the Pyroscope agent pushes JFR profiles
            # (CPU via itimer + allocation + lock) straight to the Pyroscope
            # server; it does not go through the Alloy OTLP gateway.
            - name: PYROSCOPE_APPLICATION_NAME
              value: {{ .Values.observability.serviceName | quote }}
            - name: PYROSCOPE_SERVER_ADDRESS
              value: {{ .Values.profiling.pyroscope.serverAddress | quote }}
            - name: PYROSCOPE_FORMAT
              value: "jfr"
            - name: PYROSCOPE_PROFILER_EVENT
              value: {{ .Values.profiling.pyroscope.event | quote }}
            - name: PYROSCOPE_PROFILER_ALLOC
              value: {{ .Values.profiling.pyroscope.alloc | quote }}
            - name: PYROSCOPE_PROFILER_LOCK
              value: {{ .Values.profiling.pyroscope.lock | quote }}
            # Same identity labels the other signals carry, so profiles join
            # metrics/traces/logs on service_name + service_namespace.
            - name: PYROSCOPE_LABELS
              value: "service_namespace={{ .Values.observability.serviceNamespace }},service_version={{ .Values.observability.version }},deployment_environment={{ .Values.observability.environment }}"
            {{- end }}
            {{- range $name, $value := .Values.env }}
            - name: {{ $name }}
              value: {{ $value | quote }}
            {{- end }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5

        {{- if .Values.beyla.enabled }}
        # Beyla sidecar - eBPF auto-instrumentation (opt-in; needs BTF kernel)
        - name: beyla
          image: "{{ .Values.beyla.image.repository }}:{{ .Values.beyla.image.tag }}"
          securityContext:
            # Beyla requires elevated privileges for eBPF
            privileged: true
            runAsUser: 0
            capabilities:
              add:
                - SYS_ADMIN
                - SYS_PTRACE
                - SYS_RESOURCE
                - NET_ADMIN
          env:
            # Target the application by open port
            - name: BEYLA_OPEN_PORT
              value: "{{ .Values.beyla.openPort }}"
            # Service name for traces and metrics. OTEL_SERVICE_NAME is the
            # supported form (BEYLA_SERVICE_NAME was deprecated in Beyla 2.x+).
            - name: OTEL_SERVICE_NAME
              value: {{ .Values.observability.serviceName | quote }}
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "service.namespace={{ .Values.observability.serviceNamespace }},service.version={{ .Values.observability.version }},deployment.environment.name={{ .Values.observability.environment }}"
            # OTEL exporter configuration - send to Grafana Alloy (OTLP gateway)
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "{{ .Values.beyla.otelEndpoint }}"
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: "http/protobuf"
            # Exclude health check endpoints from traces and metrics (K8s probes noise)
            - name: BEYLA_ROUTES_IGNORE_PATTERNS
              value: "/api/health,/health"
            # Disable Beyla's internal traces (only export application traces)
            - name: BEYLA_INTERNAL_METRICS_PROMETHEUS_FEATURES
              value: "application"
            # Log level
            - name: BEYLA_LOG_LEVEL
              value: "INFO"
            # Disable internal prometheus metrics export
            - name: BEYLA_PROMETHEUS_PORT
              value: "0"
            - name: BEYLA_INTERNAL_METRICS_PROMETHEUS_PORT
              value: "0"
          ports:
            - name: beyla-metrics
              containerPort: 9090
              protocol: TCP
            - name: beyla-internal
              containerPort: 9091
              protocol: TCP
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 256Mi
        {{- end }}
