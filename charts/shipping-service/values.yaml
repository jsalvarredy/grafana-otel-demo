# Shipping Service - Java / Spring Boot, auto-instrumented WITHOUT touching code.
#
# Two interchangeable auto-instrumentation strategies are supported:
#   * instrumentation.javaAgent (DEFAULT) - OpenTelemetry Java agent, baked into
#     the image and enabled via JAVA_TOOL_OPTIONS. Works on ANY kernel and emits
#     metrics, traces and logs over OTLP. This is what makes the demo reliable.
#   * beyla (OPT-IN) - eBPF auto-instrumentation via a sidecar. Requires a
#     BTF-enabled kernel (CONFIG_DEBUG_INFO_BTF=y). Showcases zero-code eBPF
#     instrumentation when the kernel supports it.
#
# Keep exactly ONE of the two enabled to avoid double-counting HTTP metrics.

# Release identity shared by Kubernetes metadata and OpenTelemetry resources.
# setup.sh overrides these values with a unique-by-default per-deploy release ID.
observability:
  serviceName: "shipping-service"
  serviceNamespace: "demo"
  version: "1.0.0"
  environment: "demo"
  revision: "unknown"
  deploymentId: "local"
  deployedAt: ""
  component: "backend"
  partOf: "grafana-otel-demo"

image:
  repository: shipping-service
  pullPolicy: Never # Force using local image loaded into Kind
  tag: "latest"

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: true
  className: nginx
  hosts:
    - host: shipping.127.0.0.1.nip.io
      paths:
        - path: /
          pathType: ImplementationSpecific

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

# OTLP target shared by both instrumentation methods. Service identity comes
# from observability.serviceName above.
otel:
  endpoint: "http://alloy.monitoring.svc.cluster.local:4318"

# DEFAULT instrumentation: OpenTelemetry Java agent (bytecode, any kernel).
# The agent jar is baked into the image by the Dockerfile at agentPath.
instrumentation:
  javaAgent:
    enabled: true
    agentPath: "/otel/opentelemetry-javaagent.jar"

# OPT-IN instrumentation: Beyla eBPF sidecar. Requires a BTF-enabled kernel.
# If you enable this, set instrumentation.javaAgent.enabled=false to avoid
# emitting duplicate HTTP metrics from both the agent and Beyla.
# Beyla 3.x is Grafana's distribution of OpenTelemetry eBPF Instrumentation
# (OBI) - Grafana donated the Beyla core to the OpenTelemetry project. The
# BEYLA_* env vars in the sidecar remain supported; service identity comes
# from OTEL_SERVICE_NAME (BEYLA_SERVICE_NAME is deprecated in 2.x+).
beyla:
  enabled: false
  image:
    repository: grafana/beyla
    # renovate: datasource=docker depName=grafana/beyla
    tag: "3.24.0"
  # Target the Java application by port
  openPort: 8080
  # Service identity comes from observability.serviceName.
  # Grafana Alloy (OTLP gateway) endpoint
  otelEndpoint: "http://alloy.monitoring.svc.cluster.local:4318"

# Extra environment variables for the app container (merged with the agent vars).
env: {}
