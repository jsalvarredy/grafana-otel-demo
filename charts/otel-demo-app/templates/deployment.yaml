apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "otel-demo-app.fullname" . }}
  labels:
    {{- include "otel-demo-app.labels" . | nindent 4 }}
  annotations:
    observability.grafana.com/revision: {{ .Values.observability.revision | quote }}
    observability.grafana.com/deployment-id: {{ .Values.observability.deploymentId | quote }}
    observability.grafana.com/deployed-at: {{ .Values.observability.deployedAt | quote }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "otel-demo-app.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "otel-demo-app.selectorLabels" . | nindent 8 }}
        {{- include "otel-demo-app.observabilityLabels" . | nindent 8 }}
      annotations:
        observability.grafana.com/revision: {{ .Values.observability.revision | quote }}
        observability.grafana.com/deployment-id: {{ .Values.observability.deploymentId | quote }}
        observability.grafana.com/deployed-at: {{ .Values.observability.deployedAt | quote }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: OTEL_SERVICE_NAME
              value: {{ .Values.observability.serviceName | quote }}
            - name: OTEL_SERVICE_VERSION
              value: {{ .Values.observability.version | quote }}
            - name: OTEL_SERVICE_NAMESPACE
              value: {{ .Values.observability.serviceNamespace | quote }}
            - name: OTEL_DEPLOYMENT_ENVIRONMENT
              value: {{ .Values.observability.environment | quote }}
            {{- range $name, $value := .Values.env }}
            - name: {{ $name }}
              value: {{ $value | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
