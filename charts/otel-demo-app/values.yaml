# Release identity shared by Kubernetes metadata and OpenTelemetry resources.
# setup.sh overrides these values with a unique-by-default per-deploy release ID.
observability:
  serviceName: "products-service"
  serviceNamespace: "demo"
  version: "2.0.0"
  environment: "demo"
  revision: "unknown"
  deploymentId: "local"
  deployedAt: ""
  component: "backend"
  partOf: "grafana-otel-demo"

image:
  repository: otel-demo-app
  pullPolicy: Never # Force using local image loaded into Kind
  tag: "latest"

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: true
  className: nginx
  hosts:
    - host: products.127.0.0.1.nip.io
      paths:
        - path: /
          pathType: ImplementationSpecific

resources:
  limits:
    cpu: 300m
    memory: 384Mi
  requests:
    cpu: 100m
    memory: 128Mi

env:
  # Grafana Alloy (OTLP gateway) endpoint
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://alloy.monitoring.svc.cluster.local:4318"
  # Attach trace exemplars to histogram samples so Grafana can jump
  # from a latency spike straight to the matching trace in Tempo.
  OTEL_METRICS_EXEMPLAR_FILTER: "trace_based"
  # Continuous profiling: push CPU/heap profiles to Pyroscope (flame graphs).
  PYROSCOPE_SERVER_ADDRESS: "http://pyroscope.monitoring.svc.cluster.local:4040"
  PYROSCOPE_APPLICATION_NAME: "products-service"
